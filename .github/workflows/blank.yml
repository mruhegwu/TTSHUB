# TTSHUB CI/CD Pipeline
# Runs on every push to main and on all pull requests targeting main.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Lint: Check code style and formatting
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
        # Skip if package.json doesn't exist yet
        continue-on-error: true

      - name: Install Node.js dependencies
        run: npm ci
        continue-on-error: true

      - name: Run ESLint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python linting tools
        run: pip install flake8 black isort
        continue-on-error: true

      - name: Run flake8
        run: flake8 src/ --max-line-length=120 --exclude=.venv
        continue-on-error: true

      - name: Check Black formatting
        run: black --check src/
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Test: Run unit and integration tests
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ttshub_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: ttshub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ttshub_test:test_password@localhost:5432/ttshub_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test_jwt_secret_for_ci_only_not_for_production
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
        continue-on-error: true

      - name: Install Node.js dependencies
        run: npm ci
        continue-on-error: true

      - name: Run Node.js tests
        run: npm test --if-present
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
        continue-on-error: true

      - name: Run Python tests
        run: |
          if [ -d tests ]; then
            pip install pytest pytest-cov
            pytest tests/ --cov=src --cov-report=xml -v
          else
            echo "No tests directory found — skipping Python tests"
          fi
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Security: Check for known vulnerabilities in dependencies
  # ---------------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
        continue-on-error: true

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit
        continue-on-error: true

      - name: Run pip-audit
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          else
            echo "No requirements.txt found — skipping pip-audit"
          fi
        continue-on-error: true
